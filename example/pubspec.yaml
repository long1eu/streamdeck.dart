name: streamdeck_example_plugin
publish_to: 'none'
description: An example plugin for the Elgato Stream Deck built in Dart using package:streamdeck.
version: 0.1.0
repository: https://github.com/DanTup/streamdeck.dart

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  image: ^4.0.4
  logging: ^1.3.0
  streamdeck:
    path: ../
  path: ^1.8.2
  json_annotation: ^4.7.0

dev_dependencies:
  lints: ^6.0.0
